name: Build & Release Call Forwarding App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      create_github_release:
        description: 'Create GitHub Release (for Release builds)'
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Prepare Keystore File for Release signing
      # The keystore can be checked in to the repo, or stored as a base64 string in Secrets (KEYSTORE_BASE64)
      - name: Prepare Signing Keystore
        if: ${{ github.event.inputs.build_type == 'Release' || github.ref_type == 'tag' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -f "xxxxxxxxxx" ]; then
            echo "Keystore file already exists in the repository. Using checked-in keystore."
          elif [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "Keystore file not found in repository. Decoding from secrets.KEYSTORE_BASE64..."
            echo "$KEYSTORE_BASE64" | base64 --decode > xxxxxxxxxx
          else
            echo "::warning::Keystore file is missing and KEYSTORE_BASE64 secret is not defined. Building an unsigned release APK."
          fi

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'Debug' }}
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'Release' || github.ref_type == 'tag' }}
        run: ./gradlew assembleRelease

      # Upload Artifact to GitHub Action Run Summary
      - name: Upload Debug APK Artifact
        if: ${{ github.event.inputs.build_type == 'Debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: Call-Forwarding-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK Artifact
        if: ${{ github.event.inputs.build_type == 'Release' || github.ref_type == 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: Call-Forwarding-Release-APK
          path: app/build/outputs/apk/release/app-release.apk

      # Automate Release Creation on Git Tag Push
      - name: Create Automated Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## Call Forwarding App Release ${{ github.ref_name }}
            
            This is an automated release compiled and signed via GitHub Actions.
            
            ### Features included:
            - Standard GSM & CDMA carrier configurations.
            - Custom MMI code builder dashboard.
            - Multi-SIM card routing.
            - Minimalist XML adaptive app icon.
            - Code obfuscation using R8 confusing letter dictionary.
            - Device status bar edge-to-edge support.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Manual Release Creation via workflow_dispatch
      - name: Create Manual Release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'Release' && github.event.inputs.create_github_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          tag_name: manual-build-${{ github.run_number }}
          name: Manual Build Release #${{ github.run_number }}
          body: |
            ## Manual Production Release #${{ github.run_number }}
            
            This release was manually triggered and compiled via workflow controls.
            
            ### Build Info:
            - **Run Number**: #${{ github.run_number }}
            - **Triggered By**: @${{ github.actor }}
            - **Obfuscation**: Enabled (R8)
            - **Signing**: Configured with JKS key
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
